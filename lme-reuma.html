<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LME Reuma · HC-UFU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Outfit:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F7F4;--surf:#FFF;--surf2:#F3F2EF;
  --border:#E4E2DC;--ink:#1C1917;--ink2:#78716C;--ink3:#A8A29E;
  --blue:#1D4ED8;--blue-bg:#EFF6FF;--blue-ring:#BFDBFE;
  --green:#15803D;--green-bg:#F0FDF4;--green-ring:#BBF7D0;
  --red:#DC2626;--red-bg:#FEF2F2;--red-ring:#FECACA;
  --amber:#B45309;--amber-bg:#FFFBEB;--amber-ring:#FDE68A;
  --r:9px;--font:'Outfit',sans-serif;--serif:'Lora',serif;--mono:'Fira Code',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.bar{height:50px;background:var(--surf);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;gap:8px}
.bar-logo{font-family:var(--serif);font-size:1rem;color:var(--blue);white-space:nowrap}
.bar-logo small{color:var(--ink3);font-size:.62rem;font-family:var(--font);display:block;line-height:1}
.bar-dr{font-size:.68rem;color:var(--ink2);text-align:right;line-height:1.4;flex-shrink:0}
.bar-dr b{display:block;color:var(--ink);font-weight:600}
.body{display:flex;flex:1;overflow:hidden}
/* Nav */
.nav{width:44px;background:var(--surf);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:3px;flex-shrink:0}
.nb{width:32px;height:32px;border-radius:7px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.9rem;
  background:transparent;color:var(--ink3);transition:.14s;position:relative}
.nb:hover{background:var(--surf2);color:var(--ink)}
.nb.on{background:var(--blue-bg);color:var(--blue)}
.nb:disabled{opacity:.28;cursor:not-allowed}
.nb .tip{position:absolute;left:40px;top:50%;transform:translateY(-50%);
  background:var(--ink);color:#fff;font-size:.67rem;padding:3px 7px;border-radius:4px;
  white-space:nowrap;pointer-events:none;z-index:200;display:none}
.nb:hover .tip{display:block}
.nb .dot{width:5px;height:5px;background:var(--blue);border-radius:50%;
  position:absolute;top:5px;right:5px}
.nsep{width:18px;height:1px;background:var(--border);margin:3px 0}
/* Main */
.main{flex:1;overflow-y:auto;padding:18px;background:var(--bg)}
.inner{max-width:720px;width:100%}
/* Typography */
.pg-title{font-family:var(--serif);font-size:1.4rem;color:var(--ink);margin-bottom:3px}
.pg-sub{font-size:.78rem;color:var(--ink2);margin-bottom:16px}
.sec-lbl{font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:10px}
/* Cards */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
/* Forms */
.f{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fl{font-size:.67rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3)}
.fi{border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;
  font-size:.86rem;font-family:var(--font);background:#fff;color:var(--ink);
  outline:none;width:100%;transition:.14s}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(29,78,216,.08)}
.fi[readonly]{background:var(--surf2);color:var(--ink2)}
textarea.fi{resize:vertical;min-height:72px;line-height:1.6}
select.fi{cursor:pointer}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.s2{grid-column:1/-1}
/* Buttons */
.btn{border:none;border-radius:7px;padding:8px 15px;font-size:.8rem;
  font-family:var(--font);font-weight:500;cursor:pointer;
  display:inline-flex;align-items:center;gap:5px;transition:.14s;white-space:nowrap}
.bp{background:var(--blue);color:#fff}.bp:hover{background:#1E40AF}
.bg{background:transparent;color:var(--ink2);border:1px solid var(--border)}.bg:hover{background:var(--surf2);color:var(--ink)}
.bd{background:var(--red-bg);color:var(--red);border:1px solid var(--red-ring)}.bd:hover{background:var(--red);color:#fff}
.bs{background:var(--green-bg);color:var(--green);border:1px solid var(--green-ring)}
.btn-sm{padding:5px 10px;font-size:.74rem;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:.69rem;border-radius:5px}
.brow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
/* Patient list */
.pt-item{display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:5px;transition:.14s}
.pt-item:hover{background:var(--surf2)}
.pt-item.sel{background:var(--blue-bg);border-color:var(--blue-ring)}
.pt-av{width:34px;height:34px;border-radius:8px;background:var(--blue-bg);
  border:1px solid var(--blue-ring);display:flex;align-items:center;justify-content:center;
  font-size:.88rem;flex-shrink:0;color:var(--blue);font-weight:700}
.pt-inf{flex:1;min-width:0}
.pt-nm{font-weight:600;font-size:.87rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pt-mt{font-size:.68rem;color:var(--ink3);font-family:var(--mono)}
.pt-ac{display:flex;gap:5px;flex-shrink:0}
/* Steps */
.steps{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.step{flex:1;padding:6px 2px;text-align:center;font-size:.65rem;font-weight:500;
  cursor:pointer;background:#fff;color:var(--ink3);border-right:1px solid var(--border);transition:.14s}
.step:last-child{border-right:none}
.step:hover{background:var(--surf2)}
.step.on{background:var(--blue);color:#fff;font-weight:600}
.step.done{background:var(--green-bg);color:var(--green)}
/* Scores */
.sc-row{display:flex;align-items:center;gap:9px;padding:7px 10px;
  background:var(--surf2);border-radius:7px;margin-bottom:7px}
.sc-k{font-family:var(--mono);font-size:.74rem;font-weight:500;color:var(--blue);min-width:50px}
.sc-v{border:1px solid var(--border);border-radius:5px;padding:4px 7px;width:70px;
  font-size:.82rem;font-family:var(--mono);outline:none;background:#fff}
.sc-v:focus{border-color:var(--blue)}
.sc-i{font-size:.72rem;color:var(--ink2)}
/* Conditions */
.co-row{display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--surf2);gap:8px}
.co-row:last-child{border-bottom:none}
.co-lb{font-size:.8rem;flex:1}
.yn{display:flex;gap:4px}
.yn-btn{padding:3px 10px;border-radius:4px;font-size:.71rem;font-weight:600;
  cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--ink3);transition:.14s}
.yn-btn.ys.on{background:var(--red-bg);color:var(--red);border-color:var(--red-ring)}
.yn-btn.nn.on{background:var(--green-bg);color:var(--green);border-color:var(--green-ring)}
/* Alerts */
.al{border-radius:7px;padding:9px 12px;font-size:.78rem;
  display:flex;gap:7px;margin-bottom:10px;line-height:1.5}
.al-i{background:var(--blue-bg);border:1px solid var(--blue-ring);color:#1E40AF}
.al-w{background:var(--amber-bg);border:1px solid var(--amber-ring);color:var(--amber)}
.al-e{background:var(--red-bg);border:1px solid var(--red-ring);color:var(--red)}
.al-s{background:var(--green-bg);border:1px solid var(--green-ring);color:var(--green)}
/* Chips */
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:9px;font-size:.67rem;font-weight:600}
.ch-b{background:var(--blue-bg);color:var(--blue)}
/* Med card */
.med-card{border:1.5px solid var(--border);border-radius:9px;padding:12px;margin-bottom:9px;background:var(--bg)}
.med-card:focus-within{border-color:var(--blue-ring);background:#fff}
.med-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.med-n{font-size:.66rem;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase}
/* Checklist */
.ck-sec{margin-bottom:16px}
.ck-ttl{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--ink3);margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.ck-it{display:flex;gap:7px;padding:4px 0;font-size:.8rem;align-items:flex-start;line-height:1.4}
.ck-bx{width:14px;height:14px;border:2px solid var(--blue);border-radius:3px;flex-shrink:0;margin-top:1px}
/* Pills */
.pill-row{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:20px;font-size:.74rem;font-weight:500;
  cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--ink2);transition:.14s}
.pill.on{background:var(--blue);color:#fff;border-color:var(--blue)}
/* Patient header */
.pt-hd{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.pt-hd-av{width:36px;height:36px;border-radius:8px;background:var(--blue-bg);
  border:1px solid var(--blue-ring);display:flex;align-items:center;justify-content:center;
  font-size:.88rem;color:var(--blue);font-weight:700;flex-shrink:0}
.pt-hd-nm{font-weight:600;font-size:.9rem}
.pt-hd-mt{font-size:.68rem;color:var(--ink3);font-family:var(--mono)}
.pt-actions{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto}
/* Divider */
.div{height:1px;background:var(--border);margin:14px 0}
/* Empty */
.empty{text-align:center;padding:36px 16px;color:var(--ink3)}
.empty-i{font-size:2.4rem;display:block;margin-bottom:10px}
.empty-t{font-family:var(--serif);font-size:1.1rem;color:var(--ink2);margin-bottom:5px}
/* Toast */
#toast{position:fixed;bottom:18px;right:18px;z-index:999;display:none;
  background:var(--ink);color:#fff;padding:9px 16px;border-radius:8px;
  font-size:.8rem;font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,.2)}
/* Score interp colors */
.interp-ok{color:var(--green)}.interp-mod{color:var(--amber)}.interp-hi{color:var(--red)}
/* Review */
.rev-row{font-size:.83rem;padding:4px 0;border-bottom:1px solid var(--surf2)}
.rev-row:last-child{border-bottom:none}
/* IMC */
.imc{font-family:var(--mono);font-size:.69rem;padding:2px 6px;border-radius:5px}
.imc-ok{background:var(--green-bg);color:var(--green)}
.imc-ow{background:var(--amber-bg);color:var(--amber)}
.imc-ob{background:var(--red-bg);color:var(--red)}
/* Mobile adjustments */
@media(max-width:480px){
  .bar-logo small{display:none}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr 1fr}
  .step{font-size:.58rem;padding:5px 1px}
  .main{padding:12px}
}
@media print{
  body > *{display:none!important}
  #print-area{display:block!important;position:static!important}
  @page{margin:8mm;size:A4}
}
#print-area{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div class="bar-logo">LME Reuma <small>HC-UFU · CEAF-MG</small></div>
    <div class="bar-dr"><b>Dr. Gustavo Pafume de Sá</b>CRM-MG 68688 · Reumatologia</div>
  </div>
  <div class="body">
    <nav class="nav" id="nav"></nav>
    <main class="main"><div class="inner" id="app-root"></div></main>
  </div>
</div>
<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const MEDICO = {
  nome:"Dr. Gustavo Pafume de Sá",crm:"CRM-MG 68688",
  especialidade:"Reumatologia",instituicao:"Hospital de Clínicas da UFU",
  endereco:"Av. Pará, 1720 - Umuarama, Uberlândia - MG, 38405-320",
  cnes:"2146355",cns:"701403641664437"
};

const CIDS = [
  {c:"M05.0",d:"Artrite reumatoide com fator reumatoide — Síndrome de Felty"},
  {c:"M05.1",d:"Artrite reumatoide com acometimento pulmonar"},
  {c:"M05.2",d:"Artrite reumatoide com vasculite"},
  {c:"M05.3",d:"Artrite reumatoide com acometimento de outros órgãos e sistemas"},
  {c:"M05.8",d:"Outras artrites reumatoides soropositivas"},
  {c:"M06.0",d:"Artrite reumatoide soronegativa"},
  {c:"M06.8",d:"Outras artrites reumatoides especificadas"},
];

const MEDS = {
  "MMCDs Sintéticos — 1ª linha":[
    {nome:"Metotrexato 2,5mg",ap:"Comp. 2,5 mg",pos:"7,5 a 25 mg/semana, VO, 1×/semana (3–10 comprimidos/sem). Associar Ácido Fólico 5 mg/semana (36h após MTX).",obs:"Primeira escolha. Contraindicado na gestação (categoria X)."},
    {nome:"Metotrexato 25mg/ml",ap:"Sol. inj. 25 mg/mL (frasco 2 mL = 50 mg)",pos:"7,5 a 25 mg/semana, SC ou IM, 1×/semana. Associar Ácido Fólico 5 mg/semana (36h após MTX).",obs:"Uso injetável quando há intolerância ao comprimido. Contraindicado na gestação (categoria X)."},
    {nome:"Leflunomida 20mg",ap:"Comp. 20 mg",pos:"20 mg/dia, VO. Dose de ataque opcional: 100 mg/dia × 3 dias.",obs:"Contraindicada na gestação. Receituário de controle especial."},
    {nome:"Sulfassalazina 500mg",ap:"Comp. 500 mg",pos:"1.000 a 3.000 mg/dia, VO, em 2–3 tomadas.",obs:""},
    {nome:"Hidroxicloroquina 400mg",ap:"Comp. 400 mg",pos:"400 mg/dia, VO (máx 5 mg/kg/dia).",obs:"Monitoramento oftalmológico anual obrigatório."},
    {nome:"Cloroquina 150mg",ap:"Comp. 150 mg",pos:"250 mg/dia, VO (máx 4 mg/kg/dia).",obs:"Monitoramento oftalmológico obrigatório."},
  ],
  "JAKi (MMCDsae) — 2ª linha":[
    {nome:"Baricitinibe 2mg",ap:"Comp. 2 mg",pos:"2 mg VO 1×/dia (dose reduzida: ≥75 anos, IRC moderada ou controle prolongado).",obs:"Apenas ≥18 anos."},
    {nome:"Baricitinibe 4mg",ap:"Comp. 4 mg",pos:"4 mg VO 1×/dia. Monoterapia ou + MTX.",obs:"Apenas ≥18 anos."},
    {nome:"Tofacitinibe 5mg",ap:"Comp. 5 mg",pos:"5 mg VO 2×/dia. Monoterapia ou + MTX.",obs:"Apenas ≥18 anos."},
    {nome:"Upadacitinibe 15mg",ap:"Comp. 15 mg (liberação prolongada)",pos:"15 mg VO 1×/dia. Monoterapia ou + MTX.",obs:"Apenas ≥18 anos."},
  ],
  "MMCDbio anti-TNF — 2ª linha":[
    {nome:"Adalimumabe 40mg",ap:"Seringa preenchida 40 mg/0,8 mL SC",pos:"40 mg SC a cada 14 dias.",obs:"Preferencialmente + MTX."},
    {nome:"Etanercepte 25mg",ap:"Frasco-ampola 25 mg SC",pos:"25 mg SC 2×/semana.",obs:"Preferencialmente + MTX."},
    {nome:"Etanercepte 50mg",ap:"Frasco-ampola 50 mg SC",pos:"50 mg SC 1×/semana.",obs:"Preferencialmente + MTX."},
    {nome:"Certolizumabe Pegol 200mg",ap:"Seringa preenchida 200 mg/mL SC",pos:"Ataque: 400 mg SC semanas 0, 2 e 4. Manutenção: 200 mg SC a cada 2 semanas.",obs:"Único anti-TNF permitido na gestação (2º trim.)."},
    {nome:"Golimumabe 50mg",ap:"Seringa preenchida 50 mg/0,5 mL SC",pos:"50 mg SC 1×/mês.",obs:"Preferencialmente + MTX."},
    {nome:"Infliximabe 100mg/10ml",ap:"Frasco-ampola 100 mg/10 mL IV",pos:"3 mg/kg IV semanas 0, 2 e 6, depois a cada 8 semanas.",obs:"Infusão hospitalar. Obrigatoriamente + MTX."},
  ],
  "MMCDbio não anti-TNF — 2ª linha":[
    {nome:"Abatacepte 125mg",ap:"Seringa preenchida 125 mg/mL SC",pos:"125 mg SC 1×/semana.",obs:"Preferencialmente + MTX."},
    {nome:"Tocilizumabe 20mg/ml",ap:"Frasco-ampola 80 mg/4 mL (20 mg/mL) IV",pos:"8 mg/kg IV a cada 4 semanas (mín 4 mg/kg, máx 800 mg/infusão).",obs:"Monoterapia ou + MTX."},
    {nome:"Rituximabe 500mg/50ml",ap:"Frasco-ampola 500 mg/50 mL IV",pos:"1.000 mg IV dias 0 e 14 (ciclo). Manutenção: 1 ciclo a cada ≥6 meses. Pré-medicar com metilprednisolona 100 mg IV.",obs:"Reservado para falha a todos os MMCDbio e MMCDsae."},
  ],
  "Imunossupressores":[
    {nome:"Azatioprina 50mg",ap:"Comp. 50 mg",pos:"1 a 3 mg/kg/dia, VO, em 1–2 tomadas.",obs:""},
    {nome:"Ciclosporina 25mg",ap:"Cáps. 25 mg",pos:"2,5 a 5 mg/kg/dia, VO, em 2 tomadas.",obs:"Monitorar PA e função renal."},
    {nome:"Ciclosporina 50mg",ap:"Cáps. 50 mg",pos:"2,5 a 5 mg/kg/dia, VO, em 2 tomadas.",obs:"Monitorar PA e função renal."},
    {nome:"Ciclosporina 100mg",ap:"Cáps. 100 mg",pos:"2,5 a 5 mg/kg/dia, VO, em 2 tomadas.",obs:"Monitorar PA e função renal."},
  ],
  "AINEs — uso sintomático":[
    {nome:"Naproxeno 500mg",ap:"Comp. 500 mg",pos:"500–1.000 mg/dia, VO, em 2 tomadas.",obs:""},
    {nome:"Ibuprofeno 600mg",ap:"Comp. 600 mg",pos:"1.200–3.200 mg/dia, VO, em 3–4 tomadas.",obs:""},
  ],
};
const ALL_MEDS = Object.values(MEDS).flat();

const CONDS = [
  "Sangramento gastrointestinal não controlado",
  "Exposição à tuberculose/residência em área de TB endêmica ou micoses endêmicas",
  "Infecção ativa, recorrente ou crônica, grave, oportunista ou localizada",
  "Infecção bacteriana com indicação de uso de antibióticos",
  "Infecção fúngica ameaçadora à vida",
  "Infecção por herpes zoster e herpes simples ativa",
  "Insuficiência hepática grave","Hepatite B aguda","Hepatite C aguda",
  "Gestante","Lactante","Porfiria","Retinopatia",
  "Hipertensão arterial sistêmica grave não controlada","Cistite hemorrágica",
  "Neoplasia nos últimos cinco anos","Insuficiência cardíaca congestiva classe III ou IV",
  "Doença neurológica desmielinizante","Esclerose múltipla",
  "Leucoencefalopatia multifocal progressiva","Risco iminente de perfuração intestinal",
  "Risco ou histórico de trombose venosa profunda (TVP) ou tromboembolismo venoso",
  "Risco para embolia pulmonar (EP)",
];

const CHECKLIST = {
  "Documentos pessoais":[
    "RG ou documento de identidade com foto","CPF",
    "Cartão Nacional de Saúde (CNS)",
    "Comprovante de residência (últimos 3 meses)",
    "Receita médica com posologia (validade 30 dias)",
    "Formulário Específico AR — preenchido e assinado (SES-MG)",
    "LME — Laudo CEAF — preenchida e assinada",
    "Laudo médico circunstanciado",
  ],
  "Exames diagnósticos":[
    "Fator Reumatoide (FR) com valor","Anti-CCP","VHS","PCR quantitativo",
    "Hemograma completo","ALT/TGP e AST/TGO","Creatinina sérica",
    "Glicemia de jejum","Urina rotina (EAS)",
    "Radiografia de mãos e punhos bilateral (PA)",
  ],
  "Exames obrigatórios para biológicos / JAKi":[
    "PPD ou IGRA","RX de tórax PA e perfil",
    "HBsAg e Anti-HBc total","Anti-HCV","Sorologia HIV",
  ],
};

// ── STATE ─────────────────────────────────────────────────────
let state = {
  view: "pacientes",
  pts: [],
  sel: null,
  lme: null,
  fe: null,
  step: 0,
  tab: "lme",   // "lme" | "fe" | "ck"
  showNovo: false,
  novo: {nome:"",mae:"",cpf:"",nasc:"",peso:"",altura:""},
};

// ── STORAGE ───────────────────────────────────────────────────
const stor = {
  get: k => { try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch{return null;} },
  set: (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} },
};

function loadPts(){ state.pts = stor.get("lme_pts") || []; }
function savePts(){ stor.set("lme_pts", state.pts); }

function loadLme(){
  if(!state.sel) return;
  state.lme = stor.get("lme_ar_"+state.sel.cpf) || initLme();
}
function saveLme(){
  if(!state.sel){ toast("Selecione um paciente"); return; }
  stor.set("lme_ar_"+state.sel.cpf, state.lme);
  // atualizar histórico
  const p = state.pts.find(x=>x.cpf===state.sel.cpf);
  if(p){ p.lmes=p.lmes||[]; const hj=new Date().toLocaleDateString("pt-BR");
    if(!p.lmes.find(h=>h.data===hj)) p.lmes.push({data:hj,d:"AR"});
    savePts(); }
  toast("LME salva ✓");
}

function loadFe(){
  if(!state.sel) return null;
  return stor.get("fe_ar_"+state.sel.cpf);
}
function saveFe(){
  if(!state.sel||!state.fe){ toast("Preencha o formulário primeiro"); return; }
  stor.set("fe_ar_"+state.sel.cpf, state.fe);
  toast("Formulário Específico salvo ✓");
}

// ── INIT ──────────────────────────────────────────────────────

// ── HELPERS ───────────────────────────────────────────────────
function fmtCPF(v){
  const n=v.replace(/\D/g,"").slice(0,11);
  if(n.length<=3) return n;
  if(n.length<=6) return n.slice(0,3)+"."+n.slice(3);
  if(n.length<=9) return n.slice(0,3)+"."+n.slice(3,6)+"."+n.slice(6);
  return n.slice(0,3)+"."+n.slice(3,6)+"."+n.slice(6,9)+"-"+n.slice(9);
}
function imc(p,a){ if(!p||!a) return null; const v=parseFloat(p)/Math.pow(parseFloat(a)/100,2); return isNaN(v)?null:v.toFixed(1); }
function imcCls(v){ if(!v) return ""; const n=parseFloat(v); if(n<18.5) return "imc imc-ow"; if(n<25) return "imc imc-ok"; if(n<30) return "imc imc-ow"; return "imc imc-ob"; }
function das28Lbl(v){ const n=parseFloat(v); if(isNaN(n)) return ""; if(n<2.6) return "Remissão"; if(n<3.2) return "Baixa"; if(n<5.1) return "Moderada"; return "Alta"; }
function das28Cls(v){ const n=parseFloat(v); if(isNaN(n)) return ""; if(n<2.6) return "interp-ok"; if(n<3.2) return "interp-ok"; if(n<5.1) return "interp-mod"; return "interp-hi"; }
function eulaSum(d){ return [d.acometimento,d.sorologia,d.inflamatorias,d.duracao].filter(v=>v!=="").reduce((a,b)=>a+Number(b),0); }
function h(tag,cls,inner,attrs=""){return `<${tag} class="${cls}" ${attrs}>${inner}</${tag}>`; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

let toastTimer;
function toast(msg){ const el=document.getElementById("toast"); el.textContent=msg; el.style.display="block"; clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.style.display="none",2800); }

}

function renderNav(){
  const nav = document.getElementById("nav");
  const items = [
    {id:"pacientes",icon:"👥",tip:"Pacientes",dis:false},
    {id:"lme",icon:"🦴",tip:"Artrite Reumatoide",dis:false},
    null,
    {id:"les",icon:"🫀",tip:"Lúpus — em breve",dis:true},
    {id:"espo",icon:"🪄",tip:"Espondiloartrites — em breve",dis:true},
    {id:"pso",icon:"🩹",tip:"Artrite Psoriásica — em breve",dis:true},
    {id:"mio",icon:"💪",tip:"Miopatias — em breve",dis:true},
    {id:"sjo",icon:"💧",tip:"Sjögren — em breve",dis:true},
    {id:"esc",icon:"🩺",tip:"Esc. Sistêmica — em breve",dis:true},
    {id:"vas",icon:"🩸",tip:"Vasculites — em breve",dis:true},
    {id:"ost",icon:"🔬",tip:"Osteoporose — em breve",dis:true},
    {id:"dor",icon:"😣",tip:"Dor Crônica — em breve",dis:true},
  ];
  nav.innerHTML = items.map(item=>{
    if(!item) return `<div class="nsep"></div>`;
    const on = state.view===item.id ? "on" : "";
    const dot = item.id==="pacientes"&&state.pts.length>0 ? `<span class="dot"></span>` : "";
    const dis = item.dis ? "disabled" : "";
    return `<button class="nb ${on}" ${dis} data-nav="${item.id}">${item.icon}${dot}<span class="tip">${esc(item.tip)}</span></button>`;
  }).join("");
}

function renderView(){
  if(state.view==="pacientes") return renderPacientes();
  if(state.view==="lme") return renderLmeView();
  return `<div class="empty"><span class="empty-i">🚧</span><div class="empty-t">Em desenvolvimento</div></div>`;
}

    </div></div>`;

  let form = "";
  if(state.showNovo){
    form = `<div class="card" style="border-color:var(--blue-ring);margin-bottom:14px">
      <div class="sec-lbl">Novo paciente</div>
      <div class="g2">
        <div class="f s2"><label class="fl">Nome Completo *</label><input class="fi" id="np-nome" placeholder="Nome completo" value="${esc(state.novo.nome)}"></div>

        <div class="f"><label class="fl">Peso (kg)</label><input class="fi" type="number" id="np-peso" placeholder="68.5" value="${esc(state.novo.peso)}"></div>
        <div class="f"><label class="fl">Altura (cm)</label><input class="fi" type="number" id="np-altura" placeholder="165" value="${esc(state.novo.altura)}"></div>
      </div>
      <div class="brow"><button class="btn bp btn-sm" id="btn-cadastrar">Salvar</button><button class="btn bg btn-sm" id="btn-cancelar-novo">Cancelar</button></div>
    </div>`;
  }

  let lista = "";

    lista = `<div class="empty"><span class="empty-i">🏥</span><div class="empty-t">Nenhum paciente ainda</div><div style="margin-bottom:14px">Cadastre o primeiro para começar</div><button class="btn bp btn-sm" id="btn-toggle-novo2">+ Novo Paciente</button></div>`;

    lista = state.pts.map(p=>{
      const im = imc(p.peso,p.altura);
      const imcSpan = im ? `<span class="${imcCls(im)}"> · IMC ${im}</span>` : "";
      const chips = (p.lmes||[]).slice(-2).map(l=>`<span class="chip ch-b">${l.d} · ${l.data}</span>`).join(" ");
      const nascStr = p.nasc ? ` · ${new Date(p.nasc+"T12:00:00").toLocaleDateString("pt-BR")}` : "";
      const sel = state.sel?.cpf===p.cpf ? "sel" : "";
      return `<div class="pt-item ${sel}" data-cpf="${esc(p.cpf)}">
        <div class="pt-av">${esc(p.nome[0])}</div>
        <div class="pt-inf">
          <div class="pt-nm">${esc(p.nome)}</div>
          <div class="pt-mt">${esc(p.cpf)}${nascStr}${p.peso?" · "+p.peso+"kg":""}${imcSpan}</div>

          <button class="btn bd btn-xs" data-del="${esc(p.cpf)}">✕</button>

}

function q(id,fn){ const el=document.getElementById(id); if(el) el.addEventListener("click",fn); }
function bindInput(id,fn,noRender){
  const el=document.getElementById(id);
  if(el) el.addEventListener("input",()=>{ fn(el.value); if(!noRender) {} });
}
function bindInputFmt(id,fn){
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener("input",()=>{ fn(el.value); const v=state.novo.cpf; el.value=v; el.setSelectionRange(v.length,v.length); });
}
function bindSel(id,fn){
  const el=document.getElementById(id);
  if(el) el.addEventListener("change",()=>fn(el.value));
}

function collectLme(){
  // Persiste valores dos inputs da LME antes de salvar/PDF
  const flds={
    "lme-anamnese":"anamnese","lme-trat-relato":"tratPrevio","lme-diagnostico":"diagnostico",
    "lme-responsavel":"nomeResponsavel","lme-data":"dataStr",
    "lme-outro-nome":"outroNome","lme-outro-cpf":"outroCPF",
    "lme-etnia":"etnia","lme-tel1":"tel1","lme-tel2":"tel2","lme-email":"email","lme-nome-social":"nomeSocial"
  };
  for(const [id,key] of Object.entries(flds)){
    const el=document.getElementById(id); if(el&&state.lme) state.lme[key]=el.value;
  }
  // Medicamentos
  document.querySelectorAll("[data-lme-med-sel]").forEach(el=>{
    const i=parseInt(el.dataset.lmeMedSel); if(state.lme?.meds[i]) state.lme.meds[i].nome=el.value;
  });
  document.querySelectorAll("[data-lme-qtd]").forEach(el=>{
    const [i,j]=el.dataset.lmeQtd.split("-").map(Number);
    if(state.lme?.meds[i]) state.lme.meds[i].qtd[j]=el.value;
  });
}

function collectFE(){
  const flds={
    "fe-historia":"historia","fe-acr87":"acr87","fe-das28":"das28","fe-sdai":"sdai","fe-cdai":"cdai",
    "fe-tratPrevios":"tratPrevios","fe-justMTX":"justMTX","fe-rituximabe":"rituximabe","fe-ppd_obs":"ppd_obs","fe-obs":"obs"
  };
  for(const [id,key] of Object.entries(flds)){
    const el=document.getElementById(id); if(el&&state.fe) state.fe[key]=el.value;
  }
  document.querySelectorAll("[data-fe-med-pos]").forEach(el=>{
    const i=parseInt(el.dataset.feMedPos); if(state.fe?.meds[i]) state.fe.meds[i].posologia=el.value;
  });
}

// ── PACIENTE ACTIONS ──────────────────────────────────────────
function selPaciente(cpf){
  state.sel = state.pts.find(p=>p.cpf===cpf)||null;
  loadLme();
  render();
}

function cadastrar(){
  const n=state.novo;
  if(!n.nome.trim()||!n.cpf.trim()){ toast("Nome e CPF são obrigatórios"); return; }
  const p={...n, id:Date.now(), lmes:[]};
  state.pts.push(p); savePts();
  state.novo={nome:"",mae:"",cpf:"",nasc:"",peso:"",altura:""};
  state.showNovo=false;
  toast("Paciente cadastrado ✓");
  render();
}

function delPaciente(cpf){
  if(!confirm("Remover paciente?")) return;
  state.pts = state.pts.filter(p=>p.cpf!==cpf);
  savePts();
  if(state.sel?.cpf===cpf) state.sel=null;
  render();
}

function testeAleatorio(){
  const pool=[
    {nome:"Maria Aparecida Silva Santos",mae:"Benedita Conceição Silva"},
    {nome:"José Carlos Oliveira Ferreira",mae:"Ana Maria Oliveira"},
    {nome:"Francisca Rodrigues Almeida",mae:"Luzia Rodrigues Costa"},
    {nome:"Antônia Pereira Nascimento",mae:"Rita de Cássia Pereira"},
  ];
  const e=pool[Math.floor(Math.random()*pool.length)];
  const raw=String(Math.floor(Math.random()*900000000)+100000000);
  const cpf=`${raw.slice(0,3)}.${raw.slice(3,6)}.${raw.slice(6,9)}-${String(Math.floor(Math.random()*90)+10)}`;
  const ano=2025-(Math.floor(Math.random()*35)+28);
  const mes=String(Math.floor(Math.random()*12)+1).padStart(2,"0");
  const dia=String(Math.floor(Math.random()*28)+1).padStart(2,"0");
  const p={nome:e.nome,mae:e.mae,cpf,nasc:`${ano}-${mes}-${dia}`,
    peso:(Math.random()*35+50).toFixed(1),altura:String(Math.floor(Math.random()*31)+155),
    id:Date.now(),lmes:[]};
  state.pts.push(p); savePts();
  state.sel=p; loadLme();
  toast(`"${p.nome.split(" ")[0]}" cadastrado ✓`);
  render();
}

// ── SALVAR & PDF ──────────────────────────────────────────────
// URL do servidor local — alterar se usar porta diferente
const SERVIDOR_URL = "http://localhost:8765";

function downloadPDF(tipo){
  const p = state.sel;
  if(!p){ toast("Selecione um paciente"); return; }

  if(tipo === "lme"){
    collectLme();
    if(!state.lme){ toast("Nenhuma LME preenchida"); return; }

    const dados = {
      medico: {
        nome: MEDICO.nome,
        cnes: MEDICO.cnes,
        cns: MEDICO.cns,
        instituicao: MEDICO.instituicao
      },
      paciente: {
        nome: p.nome || "",
        mae: p.mae || "",
        cpf: p.cpf || "",
        peso: p.peso || "",
        altura: p.altura || "",
        nomeSocial: state.lme.nomeSocial || ""
      },
      lme: {
        cid10: state.lme.cid10 || "",
        diagnostico: state.lme.diagnostico || "",
        anamnese: state.lme.anamnese || "",
        tratPrevioSim: state.lme.tratPrevioSim || false,
        tratPrevio: state.lme.tratPrevio || "",
        incapaz: state.lme.incapaz || false,
        nomeResponsavel: state.lme.nomeResponsavel || "",
        dataStr: state.lme.dataStr || "",
        meds: (state.lme.meds || []).map(m=>({
          nome: m.nome || "",
          qtd: m.qtd || ["","","","","",""]
        }))
      }
    };

    toast("Gerando PDF...");

    fetch(SERVIDOR_URL + "/gerar-lme", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(dados)
    })
    .then(res => {
      if(!res.ok) return res.text().then(t => { throw new Error(t); });
      return res.blob();
    })
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "LME_" + p.nome.replace(/\s+/g,"_") + ".pdf";
      a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
      toast("✓ PDF baixado com sucesso!");
    })
    .catch(err => {
      // Servidor não está rodando — fallback: baixa JSON para usar com script Python
      if(err.message && err.message.includes("fetch")) {
        toast("Servidor não encontrado. Baixando dados para gerar PDF manualmente...");
        const json = JSON.stringify(dados, null, 2);
        const blob = new Blob([json], {type:"application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "LME_" + p.nome.replace(/\s+/g,"_") + ".json";
        a.click();
        setTimeout(()=>URL.revokeObjectURL(url), 3000);
        setTimeout(()=>toast("Para gerar o PDF: python3 servidor_lme.py → abra http://localhost:8765"), 3200);
      } else {

  } else if(tipo === "fe"){
    collectFE();
    if(!state.fe){ toast("Preencha o Formulário Específico primeiro"); return; }

    const titulo = "FormEspecifico_AR_" + p.nome.replace(/\s+/g,"_");
    const conteudo = buildFePrintHTML(state.fe, p);
    const html = `<!DOCTYPE html>

</style>
</head>
<body>
<div id="bar"><span>📄 ${titulo.replace(/_/g," ")}</span><button id="bp">🖨 Imprimir / Salvar PDF</button></div>
<div class="doc">${conteudo}</div>
<script>document.getElementById("bp").onclick=function(){window.print()}<\/script>

    const blob = new Blob([html], {type:"text/html;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = titulo + ".html";

}
